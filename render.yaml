services:
  - type: web
    name: healthcare-monolith
    env: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-monolith-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: healthcare-monolith-db
    databaseName: healthcare_monolith_production
    user: healthcare_monolith
    plan: free
